<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ray</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{background:#0c0c0c;color:#e8e4dc;font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:#c44d2b;color:#fff}

/* plyr theme overrides */
:root{
  --plyr-color-main:#c44d2b;
  --plyr-video-background:#000;
  --plyr-badge-background:#c44d2b;
  --plyr-badge-text-color:#fff;
  --plyr-control-icon-size:16px;
  --plyr-range-thumb-height:10px;
  --plyr-range-track-height:3px;
  --plyr-video-controls-background:linear-gradient(transparent,rgba(0,0,0,0.75));
  --plyr-control-spacing:6px;
  --plyr-control-radius:4px;
}
.plyr{border-radius:4px;overflow:hidden;margin-bottom:16px}
.plyr video{max-height:70vh;width:100%;object-fit:contain;background:#000}

/* ===== SHELL ===== */
.shell{max-width:680px;margin:0 auto;padding:0 24px}

/* ===== MASTHEAD ===== */
.mast{padding:48px 0 32px}
.mast h1{font-family:'Playfair Display',Georgia,serif;font-size:2.8rem;font-weight:700;letter-spacing:-0.04em;line-height:1;color:#e8e4dc}
.mast h1 em{font-style:italic;font-weight:400;color:#c44d2b}
.mast .sub{font-size:0.82rem;color:#666;margin-top:8px;font-weight:300}
.mast .links{margin-top:12px;font-size:0.68rem;color:#555}
.mast .links a{color:#555;text-decoration:none;margin-right:14px;transition:color 0.15s}
.mast .links a:hover{color:#c44d2b}
.rule{height:1px;background:#222}

/* ===== POST ===== */
.post{padding:32px 0;border-bottom:1px solid #1a1a1a}
.post:last-child{border-bottom:none}

.post .media{position:relative;margin-bottom:16px;border-radius:4px;overflow:hidden;background:#111}
.post .media img{width:100%;display:block;max-height:70vh;object-fit:contain;transition:opacity 0.3s}
.post .media img.loading{opacity:0}
.post .media img.loaded{opacity:1}

.post h2{font-family:'Playfair Display',Georgia,serif;font-size:1.35rem;font-weight:600;line-height:1.3;letter-spacing:-0.01em;color:#e8e4dc;margin-bottom:6px}
.post h2 a{color:inherit;text-decoration:none;border-bottom:1.5px solid transparent;transition:border-color 0.15s}
.post h2 a:hover{border-bottom-color:#c44d2b}
.post.featured h2{font-size:2rem;line-height:1.2}

.post .body{font-size:0.88rem;color:#888;line-height:1.65;max-width:560px;white-space:pre-wrap;word-break:break-word}
.post .body a{color:#c44d2b;text-decoration:none;border-bottom:1px solid transparent;transition:border-color 0.15s}
.post .body a:hover{border-bottom-color:#c44d2b}

.post .meta{margin-top:10px;display:flex;gap:10px;align-items:center;font-size:0.62rem;font-family:'Inter',sans-serif;color:#444}

/* command pill */
.cmd{background:#e8e4dc;color:#0c0c0c;padding:3px 9px;border-radius:3px;font-weight:500;cursor:pointer;position:relative;transition:background 0.15s;user-select:all;display:inline-flex;align-items:center;gap:5px}
.cmd:hover{background:#fff}
.cmd .copy-icon{width:11px;height:11px;opacity:0.4;transition:opacity 0.15s}
.cmd:hover .copy-icon{opacity:0.8}
.cmd.copied{background:#c44d2b;color:#fff}
.cmd.copied .copy-icon{opacity:0}

.meta .src{color:#c44d2b;opacity:0.7;text-decoration:none;transition:opacity 0.15s}
.meta .src:hover{opacity:1}

/* ===== FOOTER ===== */
.foot{padding:40px 0 56px;text-align:center;font-size:0.65rem;color:#333}
.foot a{color:#444;text-decoration:none}
.foot a:hover{color:#c44d2b}

.ld{font-size:0.78rem;color:#444;padding:60px 0;text-align:center}

@media(max-width:600px){
  .shell{padding:0 16px}
  .mast h1{font-size:2rem}
  .post.featured h2{font-size:1.5rem}
  .post h2{font-size:1.15rem}
  .plyr video{max-height:50vh}
}
</style>
</head>
<body>
<div class="shell">
<div class="mast">
  <h1><em>ray</em></h1>
  <div class="sub">dev tools and resources worth knowing</div>
  <div class="links"><a href="https://t.me/raysterminal">telegram</a><a href="https://github.com/1RB">github</a></div>
</div>
<div class="rule"></div>
<div id="feed"><div class="ld">loading</div></div>
<div class="foot"><a href="https://t.me/raysterminal">@raysterminal</a></div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.min.js"></script>
<script>
const SKIP = ['trump','netanyahu','spain','ireland','palestine','cease','vaccines',
  'duality of man','andrew tate','windows/office','massgrave','zuckerberg',
  'meta superintelligence','anthropic running','digital whip','food supply',
  'blockade','hormuz','navy','jesus','epstein','elon','vance','iran',
  'hungary','lebanon','apple maps','whip to make','truth social','ai jesus',
  'vaccine in food','orban','obama','biden','putin','russia','china','nato',
  'lovable','kagi','ultramock','nestle','muse spark','mattrothenberg',
  'cineby','bicycle42','massgrave','react-shop'];

const DEV = ['npm','npx','open source','github.com','huggingface','ollama','pip',
  'library','component','framework','tailwind','shadcn','vercel','webgl','react',
  'next.js','typescript','javascript','css','html','python','rust','api','cli','tool',
  'editor','ui','design','figma','animation','3d','shader','svg','svelte','vue',
  'astro','vite','bundler','compiler','database','auth','saas','stripe','webgpu',
  'canvas','dom','browser','extension','plugin','font','icon','template',
  'boilerplate','starter','skeleton','toast','modal','chart','graph','map','globe',
  'haptic','whisper','model','llm','ai','agent','mcp','qwen','claude','gpt',
  'gemma','mistral','deepseek','cursor','lovable','v0','bolt','anthropic','ollama',
  'opencode','hermes','sonnet','opus','codex','copilot','whisper','suno','music',
  'audio','video','image','generative','diffusion','stable','flux','comfy','openai',
  'cobe','spell','cult','boneyard','sileo','fieldtheory','dogfood','paykit','sure',
  'haptics','pascal','aurelia','hit-area','liquid glass'];

const COPY_ICON = `<svg class="copy-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>`;

const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
const linkify = t => t.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
const trunc = (s,n) => s.length > n ? s.slice(0,n) + '\u2026' : s;

function extractUrl(text) {
  const urls = text.match(/https?:\/\/[^\s]+/g) || [];
  return urls.find(u => !u.includes('fixupx') && !u.includes('x.com/i/status')) || '';
}

function parse(p) {
  const lines = p.text.split('\n');
  let title = lines[0].replace(/\s+/g,' ').trim();
  let body = lines.slice(1).join('\n').trim();
  const url = extractUrl(p.text);
  const npm = p.text.match(/(npm\s+(?:i|install)\s+\S+|npx\s+\S+\s*\S*)/);
  if (url) body = body.replace(url,'').trim();
  // clean up trailing/leading whitespace in body
  body = body.replace(/^\s+|\s+$/g, '');
  return { title, body, url, npm, id: p.id, photos: p.photos||[], videos: p.videos||[] };
}

function copyCmd(el) {
  const text = el.dataset.cmd;
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('copied');
    const orig = el.innerHTML;
    el.innerHTML = 'copied';
    setTimeout(() => { el.innerHTML = orig; el.classList.remove('copied'); }, 1200);
  });
}

function render(allPosts) {
  const posts = allPosts.filter(p => {
    const t = p.text.toLowerCase().trim();
    if (t.length < 25) return false;
    if (SKIP.some(s => t.includes(s))) return false;
    return DEV.some(k => t.includes(k)) || p.text.length > 80;
  }).filter((p,i,arr) => {
    const key = p.text.split('\n')[0].toLowerCase().trim().slice(0,50);
    return arr.findIndex(x => x.text.split('\n')[0].toLowerCase().trim().slice(0,50) === key) === i;
  });

  const feed = document.getElementById('feed');
  feed.innerHTML = '';

  posts.forEach((p, idx) => {
    const e = parse(p);
    if (/^https?:\/\//.test(e.title) && !e.body && !e.photos.length && !e.videos.length) return;

    const cls = idx === 0 ? 'post featured' : 'post';
    let html = '';

    // media
    if (e.photos.length) {
      html += `<div class="media"><img src="${esc(e.photos[0])}" class="loading" decoding="async" onload="this.classList.replace('loading','loaded')" ${idx > 0 ? 'loading="lazy"' : ''}></div>`;
    }
    if (e.videos.length) {
      html += `<video id="vid-${e.id}" playsinline ${idx === 0 ? 'autoplay muted' : 'preload="metadata"'}><source src="${esc(e.videos[0])}" type="video/mp4"></video>`;
    }

    // title
    if (e.url) {
      html += `<h2><a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.title)}</a></h2>`;
    } else {
      html += `<h2>${esc(e.title)}</h2>`;
    }

    // body
    if (e.body) {
      html += `<div class="body">${linkify(esc(e.body))}</div>`;
    }

    // meta
    let meta = '';
    if (e.npm) {
      meta += `<span class="cmd" data-cmd="${esc(e.npm[0])}" onclick="copyCmd(this)">${esc(e.npm[0])}${COPY_ICON}</span>`;
    }
    if (e.url) {
      let host = '';
      try { host = new URL(e.url).hostname.replace('www.',''); } catch {}
      if (host) meta += `<a class="src" href="${esc(e.url)}" target="_blank">${esc(host)}</a>`;
    }
    if (meta) html += `<div class="meta">${meta}</div>`;

    const el = document.createElement('div');
    el.className = cls;
    el.innerHTML = html;
    feed.appendChild(el);
  });

  // init plyr on all videos
  if (typeof Plyr !== 'undefined') {
    Plyr.setup('video', {
      controls: ['play-large','play','progress','current-time','mute','volume','fullscreen'],
      hideControls: true,
      clickToPlay: true,
      ratio: '16:9',
      invertTime: false,
      displayDuration: true,
    });
  }
}

fetch('posts.json').then(r=>r.json()).then(render).catch(()=>{
  document.getElementById('feed').innerHTML = '<div class="ld">failed to load</div>';
});
</script>
</body>
</html>
