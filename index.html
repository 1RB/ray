<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ray</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF8F4;
      --fg: #1a1a1a;
      --muted: #8a8a8a;
      --accent: #c44d2b;
      --border: #e5e0d8;
      --surface: #f2efe9;
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'Inter', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      font-size: 15px;
      line-height: 1.6;
    }
    ::selection { background: var(--accent); color: white; }
    a { color: inherit; }

    /* ========== HEADER ========== */
    .header {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 32px 0;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--fg);
    }
    .logo {
      font-family: var(--serif);
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .logo em { font-style: italic; color: var(--accent); }
    .header-links {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      gap: 16px;
    }
    .header-links a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .header-links a:hover { color: var(--accent); }

    .date-bar {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ========== LAYOUT ========== */
    .layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 32px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 40px;
    }

    /* ========== HERO ========== */
    .hero {
      padding: 32px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .hero-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 2px;
      display: block;
      margin-bottom: 20px;
    }
    .hero video {
      width: 100%;
      border-radius: 2px;
      margin-bottom: 20px;
      background: #000;
    }
    .hero-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .hero-title {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }
    .hero-body {
      font-size: 0.95rem;
      color: #555;
      line-height: 1.65;
      max-width: 600px;
    }
    .hero-body a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
    .hero-body a:hover { border-bottom-color: var(--accent); }

    /* ========== GRID ========== */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .card {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .card:nth-child(odd) { padding-right: 20px; border-right: 1px solid var(--border); }
    .card:nth-child(even) { padding-left: 20px; }
    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 2px;
      display: block;
      margin-bottom: 12px;
    }
    .card video {
      width: 100%;
      border-radius: 2px;
      margin-bottom: 12px;
      background: #000;
    }
    .card-title {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      opacity: 0.6;
    }

    /* ========== FULL WIDTH (below grid) ========== */
    .full-width {
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
    }
    .full-title {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .full-body {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .full-body a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
    .full-body a:hover { border-bottom-color: var(--accent); }
    .full-body.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .full-meta {
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      opacity: 0.6;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .read-more {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .tag {
      font-family: var(--mono);
      font-size: 0.62rem;
      background: var(--fg);
      color: var(--bg);
      padding: 2px 7px;
      border-radius: 2px;
    }

    /* ========== SIDEBAR ========== */
    .sidebar {
      border-left: 1px solid var(--border);
      padding-left: 32px;
    }
    .sidebar-section {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-section:last-child { border-bottom: none; }
    .sidebar-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .sidebar-item {
      margin-bottom: 16px;
      cursor: pointer;
    }
    .sidebar-item:last-child { margin-bottom: 0; }
    .sidebar-item-title {
      font-family: var(--serif);
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 4px;
    }
    .sidebar-item-meta {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--muted);
      opacity: 0.5;
    }
    .sidebar-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 2px;
      display: block;
      margin-bottom: 8px;
    }

    /* ========== QUOTE ========== */
    .quote-block {
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding-left: 20px;
      margin-left: 0;
    }
    .quote-text {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-style: italic;
      line-height: 1.5;
      color: #444;
    }

    /* ========== FOOTER ========== */
    .footer {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 32px 60px;
      border-top: 2px solid var(--fg);
    }
    .footer p {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }
    .footer a { color: var(--muted); text-decoration: none; }
    .footer a:hover { color: var(--accent); }

    .loading {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
      padding: 60px 0;
      text-align: center;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; gap: 0; }
      .sidebar {
        border-left: none;
        padding-left: 0;
        border-top: 1px solid var(--border);
      }
      .grid { grid-template-columns: 1fr; }
      .card:nth-child(odd) { padding-right: 0; border-right: none; }
      .card:nth-child(even) { padding-left: 0; }
    }
    @media (max-width: 600px) {
      .header, .layout, .footer { padding-left: 20px; padding-right: 20px; }
      .hero-title { font-size: 1.6rem; }
      .logo { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo"><em>ray</em>sterminal</div>
    <div class="header-links">
      <a href="https://t.me/raysterminal">telegram</a>
      <a href="https://github.com/1RB">github</a>
    </div>
  </div>
  <div class="date-bar" id="date-bar">loading</div>
</div>

<div class="layout">
  <div>
    <div id="hero"></div>
    <div class="grid" id="grid"></div>
    <div id="feed"></div>
  </div>
  <div class="sidebar" id="sidebar"></div>
</div>

<div class="footer">
  <p>auto-curated from <a href="https://t.me/raysterminal">@raysterminal</a></p>
</div>

<script>
function linkify(t) {
  return t.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function trunc(s, n) { return s.length > n ? s.slice(0, n - 1) + '\u2026' : s; }

function parsePost(p) {
  const lines = p.text.split('\n');
  const title = lines[0];
  const body = lines.slice(1).join('\n').trim();
  const media = [...(p.photos || []), ...(p.videos || [])];
  const isQuote = p.text.length < 200 && !body && !media.length;
  const npm = p.text.match(/(npm\s+\S+\s+\S+|npx\s+\S+)/);
  return { title, body, media, isQuote, npm, id: p.id, text: p.text, photos: p.photos || [], videos: p.videos || [] };
}

function renderHero(p) {
  const { title, body, photos, videos, id } = parsePost(p);
  let mediaHtml = '';
  if (photos.length) mediaHtml += `<img class="hero-img" src="${esc(photos[0])}" loading="eager" alt="">`;
  if (videos.length) mediaHtml += `<video src="${esc(videos[0])}" controls preload="metadata" playsinline></video>`;

  document.getElementById('hero').innerHTML = `
    <div class="hero">
      ${mediaHtml}
      <div class="hero-label">latest</div>
      <div class="hero-title">${esc(title)}</div>
      ${body ? `<div class="hero-body">${linkify(esc(body))}</div>` : ''}
    </div>`;
}

function renderCard(p) {
  const { title, body, photos, videos, id } = parsePost(p);
  let mediaHtml = '';
  if (photos.length) mediaHtml += `<img class="card-img" src="${esc(photos[0])}" loading="lazy" decoding="async" alt="">`;
  if (videos.length) mediaHtml += `<video src="${esc(videos[0])}" controls preload="metadata" playsinline></video>`;

  return `<div class="card" onmouseenter="this.querySelectorAll('img[loading=lazy]').forEach(i=>{i.loading='eager';i.dataset.l=1})">
    ${mediaHtml}
    <div class="card-title">${esc(trunc(title, 100))}</div>
    ${body ? `<div class="card-desc">${esc(trunc(body, 120))}</div>` : ''}
    <div class="card-meta">#${id}</div>
  </div>`;
}

function renderFullPost(p) {
  const { title, body, npm, id, text } = parsePost(p);
  const isLong = text.length > 280;
  const bodyClass = isLong ? 'full-body collapsed' : 'full-body';
  const expandBtn = isLong ? `<button class="read-more" onclick="this.previousElementSibling.classList.remove('collapsed');this.remove()">more</button>` : '';
  const tag = npm ? `<span class="tag">${esc(npm[0])}</span>` : '';

  return `<div class="full-width">
    <div class="full-title">${esc(title)}</div>
    ${body ? `<div class="${bodyClass}">${linkify(esc(body))}</div>` : ''}
    <div class="full-meta">${tag}<span>#${id}</span>${expandBtn ? expandBtn.outerHTML || '' : ''}</div>
  </div>`;
}

function renderQuote(p) {
  return `<div class="quote-block">
    <div class="quote-text">${esc(p.text)}</div>
  </div>`;
}

function renderSidebarItem(p) {
  const { title, photos, id } = parsePost(p);
  let img = '';
  if (photos.length) img = `<img class="sidebar-img" src="${esc(photos[0])}" loading="lazy" decoding="async" alt="">`;

  return `<div class="sidebar-item">
    ${img}
    <div class="sidebar-item-title">${esc(trunc(title, 80))}</div>
    <div class="sidebar-item-meta">#${id}</div>
  </div>`;
}

function renderDate() {
  const d = new Date();
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  document.getElementById('date-bar').textContent = `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

fetch('posts.json')
  .then(r => r.json())
  .then(posts => {
    // filter out empty junk
    posts = posts.filter(p => p.text.trim().length > 20);

    renderDate();

    // hero = first post with media
    const heroIdx = posts.findIndex(p => (p.photos && p.photos.length) || (p.videos && p.videos.length));
    if (heroIdx >= 0) {
      renderHero(posts[heroIdx]);
      posts.splice(heroIdx, 1);
    }

    // next 4 posts with media -> grid cards
    const grid = document.getElementById('grid');
    let gridCount = 0;
    const usedForGrid = [];
    for (let i = 0; i < posts.length && gridCount < 4; i++) {
      if ((posts[i].photos && posts[i].photos.length) || (posts[i].videos && posts[i].videos.length)) {
        grid.innerHTML += renderCard(posts[i]);
        usedForGrid.push(posts[i].id);
        gridCount++;
      }
    }

    // remaining posts -> feed (text-focused)
    const feed = document.getElementById('feed');
    const feedPosts = posts.filter(p => !usedForGrid.includes(p.id));
    feedPosts.forEach((p, i) => {
      if (i < 15) {
        const { isQuote } = parsePost(p);
        if (isQuote) {
          feed.innerHTML += renderQuote(p);
        } else {
          feed.innerHTML += renderFullPost(p);
        }
      }
    });

    // sidebar = mid-range posts
    const sidebar = document.getElementById('sidebar');
    const sidebarPosts = posts.filter(p => !usedForGrid.includes(p.id)).slice(5, 13);
    let sidebarHtml = `<div class="sidebar-section"><div class="sidebar-label">recent</div>`;
    sidebarPosts.forEach(p => { sidebarHtml += renderSidebarItem(p); });
    sidebarHtml += '</div>';
    sidebar.innerHTML = sidebarHtml;
  })
  .catch(() => {
    document.getElementById('hero').innerHTML = '<div class="loading">failed to load</div>';
  });
</script>
</body>
</html>
