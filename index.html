<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ray</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden}
body{
  background:#0e0e0e;
  color:#d4d0c8;
  font-family:'Instrument Sans',-apple-system,system-ui,sans-serif;
  font-size:15px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
::selection{background:rgba(180,60,30,0.5);color:#fff}

/* plyr dark theme */
:root{
  --plyr-color-main:#b4441e;
  --plyr-video-background:#000;
  --plyr-control-icon-size:18px;
  --plyr-range-thumb-height:12px;
  --plyr-range-track-height:4px;
  --plyr-video-controls-background:linear-gradient(transparent,rgba(0,0,0,0.8));
  --plyr-control-spacing:8px;
  --plyr-menu-background:#1a1a1a;
  --plyr-menu-color:#d4d0c8;
  --plyr-badge-background:#b4441e;
  --plyr-badge-text-color:#fff;
}
.plyr{
  --plyr-range-fill-background:#b4441e;
  border-radius:0;
  margin-bottom:14px;
}
.plyr video{max-height:58vh;width:100%;object-fit:contain}
.plyr--video{background:#000}
.plyr__controls{font-family:'Instrument Sans',sans-serif}
.plyr__control--overlaid{background:rgba(180,60,30,0.9);width:60px;height:60px}
.plyr__control--overlaid svg{width:24px;height:24px}
.plyr__control:hover{background:transparent}

/* ===== LAYOUT ===== */
.site{max-width:580px;margin:0 auto;padding:0 20px}

/* ===== HEADER ===== */
.hdr{padding:52px 0 24px}
.hdr h1{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:2.6rem;font-weight:400;font-style:italic;
  letter-spacing:-0.02em;line-height:1;color:#e8e4dc;
}
.hdr .sub{font-size:0.76rem;color:#555;margin-top:6px}
.hdr .nav{margin-top:12px;font-size:0.64rem;color:#3a3a3a;display:flex;gap:14px}
.hdr .nav a{color:#3a3a3a;text-decoration:none;transition:color 0.2s}
.hdr .nav a:hover{color:#b4441e}
.rule{height:1px;background:#1c1c1c}

/* ===== CARD ===== */
.card{padding:22px 0;border-bottom:1px solid #171717}
.card:last-child{border-bottom:none;padding-bottom:80px}

.card .pic{margin:0 -20px 14px;overflow:hidden;background:#000;position:relative}
.card .pic img{
  width:100%;display:block;
  max-height:58vh;object-fit:contain;
  opacity:0;transition:opacity 0.5s;
}
.card .pic img.ok{opacity:1}

.card .title{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:1.25rem;font-weight:600;line-height:1.3;
  color:#e0dcd4;margin-bottom:4px;
}
.card .title a{color:inherit;text-decoration:none}
.card .title a:hover{color:#b4441e}

.card .body{
  font-size:0.84rem;color:#777;line-height:1.6;
  white-space:pre-wrap;word-break:break-word;
}
.card .body a{color:#b4441e;text-decoration:none;border-bottom:1px solid transparent}
.card .body a:hover{border-bottom-color:#b4441e}

.card .meta{margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.pill{
  display:inline-flex;align-items:center;gap:5px;
  font-size:0.68rem;font-weight:500;
  background:#1a1a1a;color:#999;
  padding:4px 10px;border-radius:4px;
  cursor:pointer;border:1px solid #222;
  transition:all 0.15s;user-select:all;
}
.pill:hover{background:#222;color:#ccc;border-color:#333}
.pill svg{width:10px;height:10px;opacity:0.4}

.host{font-size:0.6rem;color:#b4441e;opacity:0.5;text-decoration:none;transition:opacity 0.15s}
.host:hover{opacity:1}

.ld{font-size:0.75rem;color:#333;padding:80px 0;text-align:center}

@media(max-width:600px){
  .site{padding:0 14px}
  .hdr h1{font-size:2rem}
  .card .title{font-size:1.1rem}
  .card .pic{margin:0 -14px 14px}
  .plyr video{max-height:45vh}
  .card .pic img{max-height:45vh}
}
</style>
</head>
<body>
<div class="site">
  <div class="hdr">
    <h1>ray</h1>
    <div class="sub">curated dev tools and resources</div>
    <div class="nav">
      <a href="https://t.me/raysterminal">telegram</a>
      <a href="https://github.com/1RB">github</a>
    </div>
  </div>
  <div class="rule"></div>
  <div id="feed"><div class="ld">loading</div></div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.min.js"></script>
<script>
// === filter ===
const SKIP = ['trump','netanyahu','spain','ireland','palestine','cease','vaccines',
  'duality of man','andrew tate','windows/office','massgrave','zuckerberg',
  'meta superintelligence','anthropic running','digital whip','food supply',
  'blockade','hormuz','navy','jesus','epstein','elon','vance','iran',
  'hungary','lebanon','apple maps','whip to make','truth social','ai jesus',
  'vaccine in food','orban','obama','biden','putin','russia','china','nato',
  'kagi','ultramock','nestle','muse spark','mattrothenberg',
  'cineby','bicycle42','react-shop','spacetime','lovable',
  'how anthropic','digital whip','massgrave.dev','nestle.cam','ultramock.io',
  'download/activate','windows','office','pay $1.99'];

// === helpers ===
const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
const linkify = t => t.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');

function getMainUrl(text) {
  const urls = text.match(/https?:\/\/[^\s]+/g) || [];
  return urls.find(u => !u.includes('fixupx') && !u.includes('x.com/i/status')) || '';
}

function getHost(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch { return ''; }
}

function getCmd(text) {
  const m = text.match(/((?:npm|npx)\s+[^\n]+)/);
  if (!m) return '';
  return m[1].replace(/\s*https?:\/\/\S+/, '').trim();
}

function parse(p) {
  const lines = p.text.split('\n');
  let title = lines[0].replace(/\s+/g,' ').trim();
  let body = lines.slice(1).join('\n').trim();
  const url = getMainUrl(p.text);
  const cmd = getCmd(p.text);
  if (url) body = body.replace(new RegExp(url.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'').trim();
  body = body.replace(/^\s+|\s+$/g,'');
  return { title, body, url, cmd, id: p.id, photos: p.photos||[], videos: p.videos||[] };
}

function copyPill(el) {
  const text = el.dataset.cmd || el.textContent;
  navigator.clipboard.writeText(text).then(() => {
    el.style.background = '#b4441e';
    el.style.color = '#fff';
    el.style.borderColor = '#b4441e';
    const orig = el.textContent;
    el.textContent = 'copied';
    setTimeout(() => {
      el.textContent = orig;
      el.style.background = '';
      el.style.color = '';
      el.style.borderColor = '';
    }, 900);
  });
}

// === video autoplay with plyr ===
const players = [];

function initVideos() {
  // destroy any existing
  players.forEach(p => { try { p.destroy(); } catch(e){} });
  players.length = 0;

  const videoEls = document.querySelectorAll('video');
  videoEls.forEach((vid, i) => {
    const player = new Plyr(vid, {
      controls: ['play-large','play','progress','current-time','mute','volume','fullscreen'],
      autoplay: false,
      muted: true,
      hideControls: true,
      clickToPlay: true,
      resetOnEnd: false,
      keyboard: { focused: true, global: false },
    });
    players.push(player);
  });

  // intersection observer for autoplay
  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const vid = entry.target;
      const plyrInstance = vid.plyr;
      if (!plyrInstance) return;

      if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
        plyrInstance.muted = true;
        plyrInstance.play().catch(()=>{});
      } else {
        plyrInstance.pause();
      }
    });
  }, { threshold: [0, 0.5, 0.8] });

  videoEls.forEach(v => obs.observe(v));
}

// === image fade in ===
function initImages() {
  const imgs = document.querySelectorAll('.pic img');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const img = entry.target;
        if (img.complete) img.classList.add('ok');
        else img.onload = () => img.classList.add('ok');
        obs.unobserve(img);
      }
    });
  }, { rootMargin: '300px' });
  imgs.forEach(img => obs.observe(img));
}

// === render ===
function render(allPosts) {
  const posts = allPosts.filter(p => {
    const t = p.text.toLowerCase().trim();
    if (t.length < 15) return false;
    if (SKIP.some(s => t.includes(s))) return false;
    return true;
  }).filter((p,i,arr) => {
    const key = p.text.split('\n')[0].toLowerCase().trim().slice(0,55);
    return arr.findIndex(x => x.text.split('\n')[0].toLowerCase().trim().slice(0,55) === key) === i;
  });

  const feed = document.getElementById('feed');
  feed.innerHTML = '';

  posts.forEach(p => {
    const e = parse(p);
    if (/^https?:\/\//.test(e.title) && !e.body && !e.photos.length && !e.videos.length) return;

    const card = document.createElement('div');
    card.className = 'card';
    let html = '';

    // media
    if (e.photos.length) {
      html += `<div class="pic"><img src="${esc(e.photos[0])}" decoding="async" alt=""></div>`;
    } else if (e.videos.length) {
      html += `<div class="pic"><video playsinline preload="metadata"><source src="${esc(e.videos[0])}" type="video/mp4"></video></div>`;
    }

    // title
    if (e.url) {
      html += `<div class="title"><a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.title)}</a></div>`;
    } else {
      html += `<div class="title">${esc(e.title)}</div>`;
    }

    // body
    if (e.body) html += `<div class="body">${linkify(esc(e.body))}</div>`;

    // meta
    let meta = '';
    if (e.cmd) {
      meta += `<span class="pill" data-cmd="${esc(e.cmd)}" onclick="copyPill(this)">${esc(e.cmd)}<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></span>`;
    }
    if (e.url) {
      const host = getHost(e.url);
      if (host) meta += `<a class="host" href="${esc(e.url)}" target="_blank">${esc(host)}</a>`;
    }
    if (meta) html += `<div class="meta">${meta}</div>`;

    card.innerHTML = html;
    feed.appendChild(card);
  });

  // init after DOM is ready
  requestAnimationFrame(() => {
    initImages();
    // wait a tick for plyr script to be ready
    if (typeof Plyr !== 'undefined') {
      initVideos();
    } else {
      window.addEventListener('load', initVideos);
    }
  });
}

fetch('posts.json').then(r=>r.json()).then(render).catch(()=>{
  document.getElementById('feed').innerHTML = '<div class="ld">failed to load</div>';
});
</script>
</body>
</html>
