<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ray</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF8F4;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #c44d2b;
      --border: #e5e0d8;
      --surface: #f0ece6;
      --tag-bg: #eae5dd;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'Inter', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: var(--accent); color: white; }
    a { color: var(--accent); }

    .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }

    header { padding: 80px 0 48px; border-bottom: 1px solid var(--border); }
    .masthead {
      font-family: var(--serif);
      font-size: 4.5rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 12px;
    }
    .masthead em { font-style: italic; color: var(--accent); }
    .tagline {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 460px;
      line-height: 1.6;
    }
    .meta-line {
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.02em;
    }
    .meta-line a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--border); }
    .meta-line a:hover { color: var(--accent); border-color: var(--accent); }

    .feed { padding: 0 0 80px; }

    /* Post card */
    .post {
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
    }
    .post:last-child { border-bottom: none; }

    .post-media {
      margin-bottom: 14px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .post-media img, .post-media video {
      width: 100%;
      display: block;
    }
    .post-media video { background: #000; }

    .post-text {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--fg);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .post-text a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .post-text a:hover { border-bottom-color: var(--accent); }

    .post-text.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 6;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-footer {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .post-id {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      opacity: 0.5;
    }
    .post-expand {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .post-expand:hover { opacity: 0.7; }

    .tag {
      font-family: var(--mono);
      font-size: 0.68rem;
      background: var(--tag-bg);
      color: var(--muted);
      padding: 2px 8px;
      border-radius: 3px;
    }
    .tag.install { background: var(--fg); color: var(--bg); }

    footer {
      padding: 48px 0 80px;
      text-align: center;
      border-top: 1px solid var(--border);
    }
    footer p {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: var(--mono);
    }
    footer a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--border); }
    footer a:hover { color: var(--accent); border-color: var(--accent); }

    .loading {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
      padding: 40px 0;
    }

    @media (max-width: 600px) {
      .masthead { font-size: 3rem; }
      header { padding: 48px 0 32px; }
      .post { padding: 20px 0; }
    }

    /* preload link on hover */
    .post-media img { content-visibility: auto; }
  </style>
</head>
<body>
<div class="container">

<header>
  <div class="masthead"><em>ray</em></div>
  <p class="tagline">curated dev resources, tools, and takes from the timeline</p>
  <div class="meta-line">
    <a href="https://t.me/raysterminal">t.me/raysterminal</a> &middot;
    <a href="https://github.com/1RB">github</a>
  </div>
</header>

<div class="feed" id="feed">
  <div class="loading" id="loading">loading...</div>
</div>

<footer>
  <p>auto-updated from <a href="https://t.me/raysterminal">@raysterminal</a></p>
</footer>

</div>

<script>
function linkify(text) {
  return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderPosts(posts) {
  const feed = document.getElementById('feed');
  document.getElementById('loading').style.display = 'none';

  // preload images on hover
  const preloaded = new Set();

  feed.innerHTML = posts.map((p, i) => {
    const lines = p.text.split('\n');
    const title = lines[0];
    const body = lines.slice(1).join('\n').trim();
    const isLong = p.text.length > 280;
    const hasBody = body.length > 0;
    const textClass = isLong ? 'post-text collapsed' : 'post-text';

    const npm = p.text.match(/(npm\s+\S+\s+\S+|npx\s+\S+)/);
    const installTag = npm ? `<span class="tag install">${escapeHtml(npm[0])}</span> ` : '';

    let mediaHtml = '';
    if (p.photos && p.photos.length > 0) {
      mediaHtml += p.photos.map(url =>
        `<div class="post-media"><img src="${escapeHtml(url)}" loading="lazy" alt="" decoding="async"></div>`
      ).join('');
    }
    if (p.videos && p.videos.length > 0) {
      mediaHtml += p.videos.map(url =>
        `<div class="post-media"><video src="${escapeHtml(url)}" controls preload="metadata" playsinline></video></div>`
      ).join('');
    }

    const expandBtn = isLong ? `<button class="post-expand" onclick="expandPost(this)">read more</button>` : '';

    return `<div class="post" data-id="${p.id}" onmouseenter="preloadMedia(this)">
      ${mediaHtml}
      <div class="${textClass}" id="text-${p.id}">${linkify(escapeHtml(p.text))}</div>
      <div class="post-footer">
        ${installTag}
        <span class="post-id">#${p.id}</span>
        ${expandBtn}
      </div>
    </div>`;
  }).join('');
}

function expandPost(btn) {
  const post = btn.closest('.post');
  const textEl = post.querySelector('.post-text');
  textEl.classList.remove('collapsed');
  btn.remove();
}

function preloadMedia(container) {
  const imgs = container.querySelectorAll('img[loading="lazy"]');
  imgs.forEach(img => {
    if (!img.dataset.loaded) {
      img.loading = 'eager';
      img.dataset.loaded = '1';
    }
  });
}

// preload adjacent posts on hover
function preloadAdjacent(container) {
  const next = container.nextElementSibling;
  if (next && next.classList.contains('post')) preloadMedia(next);
  const prev = container.previousElementSibling;
  if (prev && prev.classList.contains('post')) preloadMedia(prev);
}

fetch('posts.json')
  .then(r => r.json())
  .then(posts => {
    renderPosts(posts);
  })
  .catch(() => {
    document.getElementById('loading').textContent = 'failed to load posts';
  });
</script>
</body>
</html>
