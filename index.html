<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ray</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{
  background:#0f0f0f;
  color:#e0dcd4;
  font-family:-apple-system,'Inter',system-ui,sans-serif;
  font-size:15px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
::selection{background:rgba(196,77,43,0.6);color:#fff}
a{color:inherit}

/* ===== SITE ===== */
.site{max-width:600px;margin:0 auto;padding:0 16px}

/* ===== HEADER ===== */
.hdr{padding:40px 0 20px}
.hdr h1{font-family:'Instrument Serif',Georgia,serif;font-size:2.2rem;font-weight:400;letter-spacing:-0.02em;line-height:1}
.hdr h1 i{color:#c44d2b}
.hdr .sub{font-size:0.78rem;color:#555;margin-top:4px;font-weight:300}
.hdr .lnk{margin-top:10px;font-size:0.65rem;color:#444}
.hdr .lnk a{color:#444;text-decoration:none;margin-right:12px;transition:color 0.2s}
.hdr .lnk a:hover{color:#c44d2b}
.sep{height:1px;background:#1c1c1c}

/* ===== CARD ===== */
.card{padding:20px 0;border-bottom:1px solid #1a1a1a}
.card:last-child{border-bottom:none;padding-bottom:60px}

/* media */
.card .pic{margin:-20px -16px 14px;overflow:hidden;background:#161616}
.card .pic img{width:100%;display:block;opacity:0;transition:opacity 0.4s ease}
.card .pic img.show{opacity:1}
.card .pic video{width:100%;display:block;max-height:520px;object-fit:contain;background:#000}

/* title */
.card .ttl{font-family:'Instrument Serif',Georgia,serif;font-size:1.2rem;font-weight:400;line-height:1.35;color:#e0dcd4;margin-bottom:5px}
.card .ttl a{color:#e0dcd4;text-decoration:none;transition:color 0.15s}
.card .ttl a:hover{color:#c44d2b}

/* body */
.card .txt{font-size:0.86rem;color:#777;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.card .txt a{color:#c44d2b;text-decoration:none;transition:opacity 0.15s}
.card .txt a:hover{opacity:0.7}

/* footer */
.card .ft{margin-top:8px;display:flex;align-items:center;gap:8px;font-size:0.6rem;color:#3a3a3a}
.card .ft .src{color:#c44d2b;opacity:0.6;text-decoration:none;transition:opacity 0.15s}
.card .ft .src:hover{opacity:1}
.card .ft .cmd{
  background:#1a1a1a;color:#999;padding:2px 7px;border-radius:3px;
  cursor:pointer;transition:background 0.15s,color 0.15s;
  user-select:all;font-family:-apple-system,'Inter',sans-serif;
  display:inline-flex;align-items:center;gap:4px;
}
.card .ft .cmd:hover{background:#252525;color:#ccc}
.card .ft .cmd.ok{background:#c44d2b;color:#fff}

/* ===== LOADING ===== */
.ld{font-size:0.75rem;color:#333;padding:80px 0;text-align:center}

@media(max-width:600px){
  .site{padding:0 12px}
  .hdr h1{font-size:1.8rem}
  .card .ttl{font-size:1.05rem}
  .card .pic{margin:-20px -12px 14px}
}
</style>
</head>
<body>
<div class="site">
  <div class="hdr">
    <h1><i>ray</i></h1>
    <div class="sub">curated dev tools and resources</div>
    <div class="lnk"><a href="https://t.me/raysterminal">telegram</a><a href="https://github.com/1RB">github</a></div>
  </div>
  <div class="sep"></div>
  <div id="feed"><div class="ld">loading</div></div>
</div>

<script>
// === filtering ===
const SKIP = ['trump','netanyahu','spain','ireland','palestine','cease','vaccines',
  'duality of man','andrew tate','windows/office','massgrave','zuckerberg',
  'meta superintelligence','anthropic running','digital whip','food supply',
  'blockade','hormuz','navy','jesus','epstein','elon','vance','iran',
  'hungary','lebanon','apple maps','whip to make','truth social','ai jesus',
  'vaccine in food','orban','obama','biden','putin','russia','china','nato',
  'lovable','kagi','ultramock','nestle','muse spark','mattrothenberg',
  'cineby','bicycle42','react-shop','spacetime','meta super','how anthropic',
  'anthropic running','digital whip'];

const DEV = ['npm','npx','open source','github.com','huggingface','ollama','pip',
  'library','component','framework','tailwind','shadcn','vercel','webgl','react',
  'next.js','typescript','javascript','css ','html ','python','rust','api','cli','tool',
  'editor','ui ','design','figma','animation','3d','shader','svg','svelte','vue',
  'astro','vite','bundler','compiler','database','auth','saas','stripe','webgpu',
  'canvas','dom','browser','extension','plugin','font','icon','template',
  'boilerplate','starter','skeleton','toast','modal','chart','graph','map','globe',
  'haptic','whisper','model','llm','ai','agent','mcp','qwen','claude','gpt',
  'gemma','mistral','deepseek','cursor','bolt','anthropic','ollama',
  'opencode','hermes','sonnet','opus','codex','copilot','suno','music',
  'audio','video','image','generative','diffusion','stable','flux','comfy','openai',
  'cobe','spell','cult','boneyard','sileo','fieldtheory','dogfood','paykit','sure',
  'haptics','pascal','aurelia','hit-area','liquid glass','minimax','glm',
  'cursor','google','apple','skoda','joe liemandt','knowledge project'];

// === helpers ===
const $ = s => document.querySelector(s);
const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
const linkify = t => t.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
const trunc = (s,n) => s.length > n ? s.slice(0,n) + '\u2026' : s;

function getMainUrl(text) {
  const urls = text.match(/https?:\/\/[^\s]+/g) || [];
  return urls.find(u => !u.includes('fixupx') && !u.includes('x.com/i/status')) || '';
}

function parse(p) {
  const lines = p.text.split('\n');
  let title = lines[0].replace(/\s+/g,' ').trim();
  let body = lines.slice(1).join('\n').trim();
  const url = getMainUrl(p.text);
  const npm = p.text.match(/(npm\s+(?:i|install)\s+\S+|npx\s+\S+\s*\S*)/);
  if (url) body = body.replace(new RegExp(url.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'').trim();
  body = body.replace(/^\s+|\s+$/g,'');
  return { title, body, url, npm, id: p.id, photos: p.photos||[], videos: p.videos||[] };
}

function copyCmd(el) {
  const text = el.textContent.trim();
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('ok');
    const orig = el.textContent;
    el.textContent = 'copied';
    setTimeout(() => { el.textContent = orig; el.classList.remove('ok'); }, 1000);
  });
}

// === intersection observer for video autoplay ===
const vidObserver = new IntersectionObserver(entries => {
  entries.forEach(e => {
    const v = e.target;
    if (e.isIntersecting) {
      v.muted = true;
      v.play().catch(()=>{});
    } else {
      v.pause();
    }
  });
}, { threshold: 0.5 });

// === image fade in ===
const imgObserver = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const img = e.target;
      if (img.complete) img.classList.add('show');
      else img.onload = () => img.classList.add('show');
      imgObserver.unobserve(img);
    }
  });
}, { rootMargin: '200px' });

// === render ===
function render(allPosts) {
  const posts = allPosts.filter(p => {
    const t = p.text.toLowerCase().trim();
    if (t.length < 20) return false;
    if (SKIP.some(s => t.includes(s))) return false;
    return DEV.some(k => t.includes(k)) || p.text.length > 100;
  }).filter((p,i,arr) => {
    const key = p.text.split('\n')[0].toLowerCase().trim().slice(0,50);
    return arr.findIndex(x => x.text.split('\n')[0].toLowerCase().trim().slice(0,50) === key) === i;
  });

  const feed = document.getElementById('feed');
  feed.innerHTML = '';

  posts.forEach(p => {
    const e = parse(p);
    // skip posts that are just a URL with no context
    if (/^https?:\/\//.test(e.title) && !e.body && !e.photos.length && !e.videos.length) return;

    const card = document.createElement('div');
    card.className = 'card';

    let html = '';

    // media
    if (e.photos.length) {
      html += `<div class="pic"><img src="${esc(e.photos[0])}" decoding="async" alt=""></div>`;
    } else if (e.videos.length) {
      html += `<div class="pic"><video src="${esc(e.videos[0])}" muted loop playsinline></video></div>`;
    }

    // title
    if (e.url) {
      html += `<div class="ttl"><a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.title)}</a></div>`;
    } else {
      html += `<div class="ttl">${esc(e.title)}</div>`;
    }

    // body
    if (e.body) {
      html += `<div class="txt">${linkify(esc(e.body))}</div>`;
    }

    // footer
    let ft = '';
    if (e.npm) {
      ft += `<span class="cmd" onclick="copyCmd(this)">${esc(e.npm[0])}</span>`;
    }
    if (e.url) {
      let host = '';
      try { host = new URL(e.url).hostname.replace('www.',''); } catch {}
      if (host) ft += `<a class="src" href="${esc(e.url)}" target="_blank">${esc(host)}</a>`;
    }
    if (ft) html += `<div class="ft">${ft}</div>`;

    card.innerHTML = html;
    feed.appendChild(card);

    // observe images
    const img = card.querySelector('.pic img');
    if (img) imgObserver.observe(img);

    // observe videos for autoplay
    const vid = card.querySelector('.pic video');
    if (vid) vidObserver.observe(vid);
  });
}

fetch('posts.json').then(r=>r.json()).then(render).catch(()=>{
  document.getElementById('feed').innerHTML = '<div class="ld">failed to load</div>';
});
</script>
</body>
</html>
