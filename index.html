<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>raysterminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF8F4;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #c44d2b;
      --border: #e5e0d8;
      --surface: #f0ece6;
      --tag-bg: #eae5dd;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'Inter', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: var(--accent); color: white; }

    .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }

    /* Header */
    header {
      padding: 80px 0 60px;
      border-bottom: 1px solid var(--border);
    }
    .masthead {
      font-family: var(--serif);
      font-size: 4.5rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 12px;
    }
    .masthead a { color: var(--fg); text-decoration: none; }
    .masthead em { font-style: italic; color: var(--accent); }
    .tagline {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 460px;
      line-height: 1.6;
    }
    .meta-line {
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.02em;
    }
    .meta-line a {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
    }
    .meta-line a:hover { color: var(--accent); border-color: var(--accent); }

    /* Feed */
    section { padding: 48px 0; }
    .section-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Entry */
    .entry {
      margin-bottom: 0;
      border-bottom: 1px solid var(--border);
      padding: 24px 0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .entry:first-child { padding-top: 0; }
    .entry:last-child { border-bottom: none; }
    .entry:hover { background: var(--surface); margin-left: -12px; margin-right: -12px; padding-left: 12px; padding-right: 12px; border-radius: 4px; }
    .entry-title {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 6px;
      color: var(--fg);
    }
    .entry-desc {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.65;
      margin-bottom: 10px;
    }
    .entry-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .tag {
      font-family: var(--mono);
      font-size: 0.7rem;
      background: var(--tag-bg);
      color: var(--muted);
      padding: 2px 10px;
      border-radius: 3px;
      letter-spacing: 0.02em;
    }
    .tag.install {
      background: var(--fg);
      color: var(--bg);
    }
    .source {
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.6;
    }
    .media-badge {
      font-size: 0.65rem;
      font-family: var(--mono);
      color: var(--accent);
      opacity: 0.8;
    }

    /* Detail view */
    .detail { display: none; }
    .detail.active { display: block; }
    .feed.hidden { display: none; }

    .back-link {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 32px;
      padding: 4px 0;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    .detail-title {
      font-family: var(--serif);
      font-size: 2.2rem;
      font-weight: 400;
      line-height: 1.25;
      margin-bottom: 24px;
      letter-spacing: -0.01em;
    }

    .detail-media {
      margin-bottom: 28px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .detail-media img {
      width: 100%;
      display: block;
    }
    .detail-media video {
      width: 100%;
      display: block;
      background: #000;
    }

    .detail-body {
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--fg);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .detail-body a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      transition: opacity 0.2s;
    }
    .detail-body a:hover { opacity: 0.7; }

    .detail-meta {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .detail-link {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: color 0.2s;
    }
    .detail-link:hover { color: var(--accent); border-color: var(--accent); }

    /* Footer */
    footer {
      padding: 48px 0 80px;
      text-align: center;
      border-top: 1px solid var(--border);
    }
    footer p {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* Loading */
    .loading {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
      padding: 40px 0;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .masthead { font-size: 3rem; }
      header { padding: 48px 0 40px; }
      section { padding: 36px 0; }
      .detail-title { font-size: 1.8rem; }
    }

    /* Animations */
    .entry { opacity: 0; animation: fadeIn 0.3s ease forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
    .entry:nth-child(1) { animation-delay: 0.02s; }
    .entry:nth-child(2) { animation-delay: 0.04s; }
    .entry:nth-child(3) { animation-delay: 0.06s; }
    .entry:nth-child(4) { animation-delay: 0.08s; }
    .entry:nth-child(5) { animation-delay: 0.1s; }
    .entry:nth-child(6) { animation-delay: 0.12s; }
    .entry:nth-child(7) { animation-delay: 0.14s; }
    .entry:nth-child(8) { animation-delay: 0.16s; }
    .entry:nth-child(9) { animation-delay: 0.18s; }
    .entry:nth-child(10) { animation-delay: 0.2s; }
  </style>
</head>
<body>
<div class="container">

<header>
  <div class="masthead"><a href="#"><em>ray</em>sterminal</a></div>
  <p class="tagline">curated dev resources, tools, and takes from the timeline</p>
  <div class="meta-line">
    <a href="https://t.me/raysterminal">t.me/raysterminal</a> &middot;
    <a href="https://github.com/1RB">github</a>
  </div>
</header>

<!-- Feed view -->
<section class="feed" id="feed">
  <div class="loading" id="loading">loading posts...</div>
  <div id="entries"></div>
</section>

<!-- Detail view -->
<section class="detail" id="detail">
  <a href="#" class="back-link" id="back-link">&larr; all posts</a>
  <div id="detail-content"></div>
</section>

<footer>
  <p>auto-updated from <a href="https://t.me/raysterminal" style="color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border);">@raysterminal</a></p>
</footer>

</div>

<script>
let posts = [];

function linkify(text) {
  return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function truncate(s, max) {
  if (s.length <= max) return s;
  return s.substring(0, max - 3) + '...';
}

function showFeed() {
  document.getElementById('feed').classList.remove('hidden');
  document.getElementById('detail').classList.remove('active');
  window.scrollTo(0, 0);
}

function showDetail(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return showFeed();

  const lines = post.text.split('\n');
  const title = lines[0];
  const body = lines.slice(1).join('\n').trim();

  let mediaHtml = '';
  if (post.photos && post.photos.length > 0) {
    mediaHtml += post.photos.map(url =>
      `<div class="detail-media"><img src="${escapeHtml(url)}" loading="lazy" alt=""></div>`
    ).join('');
  }
  if (post.videos && post.videos.length > 0) {
    mediaHtml += post.videos.map(url =>
      `<div class="detail-media"><video src="${escapeHtml(url)}" controls preload="metadata"></video></div>`
    ).join('');
  }

  const urls = post.text.match(/(https?:\/\/[^\s]+)/g) || [];

  document.getElementById('detail-content').innerHTML = `
    <h1 class="detail-title">${escapeHtml(title)}</h1>
    ${mediaHtml}
    ${body ? `<div class="detail-body">${linkify(escapeHtml(body))}</div>` : ''}
    <div class="detail-meta">
      <span class="source">#${post.id}</span>
      ${urls.length > 0 ? urls.map(u => `<a href="${escapeHtml(u)}" target="_blank" class="detail-link">${escapeHtml(truncate(u.replace(/https?:\/\//, ''), 40))}</a>`).join('') : ''}
    </div>
  `;

  document.getElementById('feed').classList.add('hidden');
  document.getElementById('detail').classList.add('active');
  window.scrollTo(0, 0);
}

function renderFeed() {
  const container = document.getElementById('entries');
  document.getElementById('loading').style.display = 'none';

  container.innerHTML = posts.map((p, i) => {
    const lines = p.text.split('\n');
    const title = lines[0];
    const desc = lines.slice(1).join(' ').trim();
    const hasMedia = (p.photos && p.photos.length > 0) || (p.videos && p.videos.length > 0);
    const mediaBadge = hasMedia ? `<span class="media-badge">${p.photos?.length || 0} img${(p.photos?.length || 0) !== 1 ? 's' : ''}${p.videos?.length ? ' + ' + p.videos.length + ' video' + (p.videos.length !== 1 ? 's' : '') : ''}</span>` : '';

    const npm = p.text.match(/(npm\s+\S+\s+\S+|npx\s+\S+)/);
    const installTag = npm ? `<span class="tag install">${escapeHtml(npm[0])}</span>` : '';

    return `<div class="entry" onclick="showDetail('${p.id}')" style="animation-delay:${Math.min(i * 0.02, 0.3)}s">
      <div class="entry-title">${escapeHtml(truncate(title, 120))}</div>
      ${desc ? `<p class="entry-desc">${escapeHtml(truncate(desc, 200))}</p>` : ''}
      <div class="entry-meta">${installTag}${mediaBadge}<span class="source">#${p.id}</span></div>
    </div>`;
  }).join('');
}

function handleHash() {
  const hash = window.location.hash;
  if (hash.startsWith('#post-')) {
    const id = hash.replace('#post-', '');
    if (posts.length > 0) showDetail(id);
  } else {
    showFeed();
  }
}

window.addEventListener('hashchange', handleHash);

fetch('posts.json')
  .then(r => r.json())
  .then(data => {
    posts = data;
    renderFeed();
    handleHash();
  })
  .catch(() => {
    document.getElementById('loading').textContent = 'failed to load posts';
  });
</script>
</body>
</html>
