<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ray</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden;scroll-behavior:smooth}
body{
  background:#09090b;
  color:#e4e0d8;
  font-family:'Inter',-apple-system,system-ui,sans-serif;
  font-size:15px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
::selection{background:rgba(194,65,12,0.45);color:#fff}
a{color:inherit;text-decoration:none}

/* === PAGE === */
.page{max-width:560px;margin:0 auto;padding:0 20px}

/* === HEADER === */
.h{padding:56px 0 28px;display:flex;justify-content:space-between;align-items:flex-end}
.h h1{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:2.8rem;font-weight:400;font-style:italic;
  letter-spacing:-0.03em;line-height:1;color:#e4e0d8;
}
.h .links{font-size:0.62rem;color:#444;display:flex;gap:14px}
.h .links a{color:#444;transition:color 0.2s}
.h .links a:hover{color:#c2410c}
.rule{height:1px;background:#1f1f1f}

/* === CARD === */
.card{padding:0;border-bottom:1px solid #161616}
.card:last-child{border-bottom:none}

/* media wrapper - full bleed */
.m{
  margin:0 -20px;
  background:#0a0a0a;
  overflow:hidden;
  position:relative;
}

/* image */
.m img{
  width:100%;
  display:block;
  max-height:62vh;
  object-fit:contain;
  opacity:0;
  transition:opacity 0.6s cubic-bezier(0.4,0,0.2,1);
}
.m img.ok{opacity:1}

/* video - using native controls styled */
.m .vid{
  width:100%;
  display:block;
  max-height:62vh;
  object-fit:contain;
  background:#000;
  cursor:pointer;
}

/* custom video overlay */
.m .vid-wrap{position:relative}
.m .vid-wrap video{
  width:100%;display:block;
  max-height:62vh;object-fit:contain;
  background:#000;
}
.m .play-btn{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.2);
  transition:background 0.2s,opacity 0.2s;
  cursor:pointer;
  opacity:0;
}
.m:hover .play-btn{opacity:1}
.m .play-btn.hidden{opacity:0;pointer-events:none}
.m .play-btn svg{
  width:56px;height:56px;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,0.4));
  transition:transform 0.15s;
}
.m:hover .play-btn svg{transform:scale(1.05)}

/* controls bar */
.m .ctrl{
  position:absolute;bottom:0;left:0;right:0;
  padding:0 14px 10px;
  background:linear-gradient(transparent,rgba(0,0,0,0.7));
  display:flex;align-items:center;gap:8px;
  opacity:0;transition:opacity 0.2s;
}
.m:hover .ctrl,.m .ctrl.show{opacity:1}
.m .bar{
  flex:1;height:3px;
  background:rgba(255,255,255,0.15);
  border-radius:2px;cursor:pointer;
  position:relative;overflow:hidden;
}
.m .bar .fill{
  height:100%;background:#c2410c;
  border-radius:2px;width:0;
  transition:width 0.1s linear;
}
.m .time{
  font-size:0.6rem;color:rgba(255,255,255,0.5);
  font-variant-numeric:tabular-nums;
  min-width:30px;text-align:right;
}
.m .mute-btn{
  background:none;border:none;
  color:rgba(255,255,255,0.6);cursor:pointer;
  padding:2px;display:flex;align-items:center;
  transition:color 0.15s;
}
.m .mute-btn:hover{color:#fff}

/* text content */
.t{padding:16px 0 20px}
.t .title{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:1.3rem;font-weight:500;
  line-height:1.3;color:#e4e0d8;
  margin-bottom:5px;
  letter-spacing:-0.005em;
}
.t .title a:hover{color:#c2410c}

.t .body{
  font-size:0.84rem;color:#6b6b6b;
  line-height:1.65;
  white-space:pre-wrap;word-break:break-word;
}
.t .body a{color:#c2410c;border-bottom:1px solid transparent;transition:border-color 0.15s}
.t .body a:hover{border-bottom-color:#c2410c}

/* meta */
.meta{
  margin-top:10px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}

/* command pill */
.cmd{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Inter',sans-serif;font-size:0.64rem;font-weight:500;
  background:#151515;color:#888;
  padding:4px 10px;border-radius:4px;
  cursor:pointer;border:1px solid #1e1e1e;
  transition:all 0.15s;user-select:all;
}
.cmd:hover{background:#1c1c1c;color:#bbb;border-color:#2a2a2a}
.cmd:active{background:#c2410c;color:#fff;border-color:#c2410c}
.cmd .ico{width:10px;height:10px;opacity:0.3}

.src{
  font-size:0.58rem;color:#c2410c;
  opacity:0.45;text-decoration:none;
  transition:opacity 0.15s;
}
.src:hover{opacity:1}

/* footer */
.foot{padding:48px 0 64px;text-align:center;font-size:0.6rem;color:#2a2a2a}
.foot a{color:#333;text-decoration:none;transition:color 0.15s}
.foot a:hover{color:#c2410c}

/* loading */
.ld{font-size:0.72rem;color:#2a2a2a;padding:80px 0;text-align:center}

@media(max-width:600px){
  .page{padding:0 14px}
  .h{flex-direction:column;align-items:flex-start;gap:8px}
  .h h1{font-size:2.2rem}
  .t .title{font-size:1.1rem}
  .m{margin:0 -14px}
  .m img,.m .vid-wrap video{max-height:50vh}
}
</style>
</head>
<body>
<div class="page">
  <div class="h">
    <h1>ray</h1>
    <div class="links">
      <a href="https://t.me/raysterminal">telegram</a>
      <a href="https://github.com/1RB">github</a>
    </div>
  </div>
  <div class="rule"></div>
  <div id="feed"><div class="ld">loading</div></div>
  <div class="foot"><a href="https://t.me/raysterminal">@raysterminal</a></div>
</div>

<script>
const SKIP = ['trump','netanyahu','spain','ireland','palestine','vance','iran','hungary',
  'blockade','hormuz','navy','orban','obama','biden','putin','russia','china','nato',
  'vaccines','food supply','jesus','epstein','truth social','apple maps','lebanon',
  'duality of man','forget winning','consider that the dumbest','it\'s all in your head',
  'if the united states','lovable','kagi','ultramock','nestle','mattrothenberg',
  'cineby','bicycle42','massgrave','react-shop','spacetime','download/activate',
  'windows','office','pay $1.99','ai jesus','$1.99','muse spark','meta superintelligence',
  'digital whip','how anthropic','anthropic running','zuckerberg','andrew tate',
  'cease and desist','new prime minister','trump just','netanyahu issues',
  'fixupx.com','x.com/mattrothenberg'];

const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
const linkify = t => t.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
const host = u => { try { return new URL(u).hostname.replace('www.',''); } catch { return ''; } };

function getUrl(t) {
  const urls = t.match(/https?:\/\/[^\s]+/g) || [];
  return urls.find(u => !u.includes('fixupx') && !u.includes('x.com/i/status')) || '';
}

function getCmd(t) {
  const m = t.match(/((?:npm|npx)\s+[^\n]+)/);
  return m ? m[1].replace(/\s*https?:\/\/\S+/,'').trim() : '';
}

function parse(p) {
  const lines = p.text.split('\n');
  let title = lines[0].replace(/\s+/g,' ').trim();
  let body = lines.slice(1).join('\n').trim();
  const url = getUrl(p.text);
  const cmd = getCmd(p.text);
  if (url) body = body.replace(new RegExp(url.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'').trim();
  return { title, body: body.trim(), url, cmd, id: p.id, photos: p.photos||[], videos: p.videos||[] };
}

// === VIDEO ENGINE ===
function fmt(s) {
  s = Math.floor(s);
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}

function initVideo(wrap) {
  const vid = wrap.querySelector('video');
  const playBtn = wrap.querySelector('.play-btn');
  const bar = wrap.querySelector('.bar');
  const fill = wrap.querySelector('.fill');
  const timeEl = wrap.querySelector('.time');
  const muteBtn = wrap.querySelector('.mute-btn');
  const ctrl = wrap.querySelector('.ctrl');

  let hideTimeout;

  vid.muted = true;
  vid.loop = true;
  vid.playsInline = true;

  function showCtrl() {
    ctrl.classList.add('show');
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => { if (!vid.paused) ctrl.classList.remove('show'); }, 2000);
  }

  function toggle() {
    if (vid.paused) {
      // pause all others
      document.querySelectorAll('.vid-wrap video').forEach(v => {
        if (v !== vid) { v.pause(); v.closest('.vid-wrap').querySelector('.play-btn').classList.remove('hidden'); }
      });
      vid.play();
      playBtn.classList.add('hidden');
      showCtrl();
    } else {
      vid.pause();
      playBtn.classList.remove('hidden');
      ctrl.classList.add('show');
    }
  }

  playBtn.addEventListener('click', toggle);
  vid.addEventListener('click', toggle);

  vid.addEventListener('timeupdate', () => {
    if (vid.duration) {
      fill.style.width = (vid.currentTime / vid.duration * 100) + '%';
      timeEl.textContent = fmt(vid.currentTime);
    }
  });

  vid.addEventListener('ended', () => {
    playBtn.classList.remove('hidden');
    fill.style.width = '0';
  });

  vid.addEventListener('play', () => {
    playBtn.classList.add('hidden');
  });

  vid.addEventListener('pause', () => {
    playBtn.classList.remove('hidden');
    ctrl.classList.add('show');
  });

  bar.addEventListener('click', e => {
    const r = bar.getBoundingClientRect();
    vid.currentTime = (e.clientX - r.left) / r.width * vid.duration;
  });

  muteBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>';
  muteBtn.addEventListener('click', e => {
    e.stopPropagation();
    vid.muted = !vid.muted;
    muteBtn.innerHTML = vid.muted
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>';
  });

  // hover shows controls
  wrap.addEventListener('mousemove', showCtrl);
}

// autoplay on scroll
const vidObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    const vid = e.target;
    const wrap = vid.closest('.vid-wrap');
    if (!wrap) return;
    if (e.isIntersecting && e.intersectionRatio > 0.5) {
      vid.muted = true;
      vid.play().catch(()=>{});
      wrap.querySelector('.play-btn').classList.add('hidden');
    } else {
      vid.pause();
      wrap.querySelector('.play-btn').classList.remove('hidden');
    }
  });
}, { threshold: [0, 0.5, 0.8] });

// image fade
const imgObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const img = e.target;
      if (img.complete) img.classList.add('ok');
      else img.onload = () => img.classList.add('ok');
      imgObs.unobserve(img);
    }
  });
}, { rootMargin: '400px' });

function copyPill(el) {
  const text = el.dataset.cmd || el.textContent;
  navigator.clipboard.writeText(text).then(() => {
    el.style.background = '#c2410c';
    el.style.color = '#fff';
    el.style.borderColor = '#c2410c';
    el.textContent = 'copied';
    setTimeout(() => {
      el.textContent = text;
      el.style.background = '';
      el.style.color = '';
      el.style.borderColor = '';
    }, 800);
  });
}

// === RENDER ===
function render(allPosts) {
  const posts = allPosts.filter(p => {
    const t = p.text.toLowerCase().trim();
    if (t.length < 15) return false;
    if (SKIP.some(s => t.includes(s))) return false;
    return true;
  }).filter((p,i,arr) => {
    const key = p.text.split('\n')[0].toLowerCase().trim().slice(0,55);
    return arr.findIndex(x => x.text.split('\n')[0].toLowerCase().trim().slice(0,55) === key) === i;
  });

  const feed = document.getElementById('feed');
  feed.innerHTML = '';

  posts.forEach(p => {
    const e = parse(p);
    if (/^https?:\/\//.test(e.title) && !e.body && !e.photos.length && !e.videos.length) return;

    const card = document.createElement('div');
    card.className = 'card';

    let mediaHtml = '';
    if (e.photos.length) {
      mediaHtml = `<div class="m"><img src="${esc(e.photos[0])}" decoding="async" alt=""></div>`;
    } else if (e.videos.length) {
      mediaHtml = `<div class="m"><div class="vid-wrap">
        <video src="${esc(e.videos[0])}" preload="metadata"></video>
        <div class="play-btn"><svg viewBox="0 0 24 24" fill="white"><polygon points="6,3 20,12 6,21"/></svg></div>
        <div class="ctrl">
          <div class="bar"><div class="fill"></div></div>
          <span class="time">0:00</span>
          <button class="mute-btn"></button>
        </div>
      </div></div>`;
    }

    let titleHtml = e.url
      ? `<div class="title"><a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.title)}</a></div>`
      : `<div class="title">${esc(e.title)}</div>`;

    let bodyHtml = e.body ? `<div class="body">${linkify(esc(e.body))}</div>` : '';

    let metaHtml = '';
    if (e.cmd) {
      metaHtml += `<span class="cmd" data-cmd="${esc(e.cmd)}" onclick="copyPill(this)">${esc(e.cmd)}<svg class="ico" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></span>`;
    }
    if (e.url) {
      const h = host(e.url);
      if (h) metaHtml += `<a class="src" href="${esc(e.url)}" target="_blank">${esc(h)}</a>`;
    }
    if (metaHtml) metaHtml = `<div class="meta">${metaHtml}</div>`;

    card.innerHTML = `<div class="t">${titleHtml}${bodyHtml}${metaHtml}</div>`;
    // prepend media before text
    if (mediaHtml) {
      const mDiv = document.createElement('div');
      mDiv.innerHTML = mediaHtml;
      card.insertBefore(mDiv.firstElementChild, card.firstChild);
    }

    feed.appendChild(card);
  });

  // init
  requestAnimationFrame(() => {
    document.querySelectorAll('.m img').forEach(img => imgObs.observe(img));
    document.querySelectorAll('.vid-wrap').forEach(wrap => {
      initVideo(wrap);
      const vid = wrap.querySelector('video');
      vidObs.observe(vid);
    });
  });
}

fetch('posts.json').then(r=>r.json()).then(render).catch(()=>{
  document.getElementById('feed').innerHTML = '<div class="ld">failed to load</div>';
});
</script>
</body>
</html>
