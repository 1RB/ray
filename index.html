<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ray</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #FAF8F4;
      color: #111;
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: #b5421f; color: #FAF8F4; }

    .page { max-width: 780px; margin: 0 auto; padding: 0 28px; }

    /* header */
    .header {
      padding: 56px 0 40px;
    }
    .header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 10px;
    }
    .header h1 em {
      font-style: italic;
      font-weight: 500;
      color: #b5421f;
    }
    .header p {
      font-size: 0.92rem;
      color: #8a8880;
      max-width: 440px;
      line-height: 1.55;
    }
    .header-links {
      margin-top: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
    }
    .header-links a {
      color: #8a8880;
      text-decoration: none;
      margin-right: 16px;
      transition: color 0.15s;
    }
    .header-links a:hover { color: #b5421f; }

    .divider {
      height: 1px;
      background: #d8d4cc;
      margin: 0;
    }

    /* post */
    .post {
      padding: 36px 0;
      border-bottom: 1px solid #e8e4dc;
    }
    .post:last-child { border-bottom: none; }

    .post-media {
      margin-bottom: 18px;
      border-radius: 3px;
      overflow: hidden;
    }
    .post-media img {
      width: 100%;
      display: block;
    }
    .post-media video {
      width: 100%;
      display: block;
      background: #111;
      border-radius: 3px;
    }

    .post-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1.28;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    .post-title a {
      color: #111;
      text-decoration: none;
      border-bottom: 1.5px solid transparent;
      transition: border-color 0.15s;
    }
    .post-title a:hover { border-bottom-color: #b5421f; }

    .post-body {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.65;
      max-width: 600px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .post-body a {
      color: #b5421f;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .post-body a:hover { border-bottom-color: #b5421f; }

    .post-meta {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .post-meta .cmd {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      background: #111;
      color: #FAF8F4;
      padding: 3px 8px;
      border-radius: 3px;
    }
    .post-meta .id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: #aaa;
    }
    .post-meta a.source {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: #b5421f;
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.15s;
    }
    .post-meta a.source:hover { opacity: 1; }

    /* first post is bigger */
    .post.featured .post-title {
      font-size: 2.2rem;
      line-height: 1.18;
    }
    .post.featured .post-media {
      margin-bottom: 20px;
    }

    /* no-media post */
    .post.text-only {
      padding: 24px 0;
    }
    .post.text-only .post-title {
      font-size: 1.2rem;
    }

    /* footer */
    .footer {
      padding: 40px 0 64px;
      text-align: center;
    }
    .footer p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: #aaa;
    }
    .footer a { color: #aaa; text-decoration: none; }
    .footer a:hover { color: #b5421f; }

    .loading {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: #aaa;
      padding: 60px 0;
    }

    @media (max-width: 600px) {
      .header h1 { font-size: 2.4rem; }
      .post.featured .post-title { font-size: 1.6rem; }
      .post-title { font-size: 1.2rem; }
      .page { padding: 0 20px; }
    }
  </style>
</head>
<body>
<div class="page">

<div class="header">
  <h1><em>ray</em></h1>
  <p>curated dev tools, libraries, and resources worth knowing about</p>
  <div class="header-links">
    <a href="https://t.me/raysterminal">telegram</a>
    <a href="https://github.com/1RB">github</a>
  </div>
</div>

<div class="divider"></div>

<div id="feed">
  <div class="loading">loading...</div>
</div>

<div class="footer">
  <p>curated from <a href="https://t.me/raysterminal">@raysterminal</a></p>
</div>

</div>

<script>
function linkify(t) {
  return t.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

const SKIP = ['trump','netanyahu','spain','ireland','palestine','cease','vaccines',
  'duality of man','andrew tate','windows/office','massgrave','zuckerberg',
  'meta superintelligence','anthropic running','digital whip','food supply',
  'blockade','hormuz','navy','jesus','epstein','elon','vance','iran',
  'hungary','lebanon','apple maps','whip to make','truth social'];

const DEV_KW = ['npm','npx','open source','github.com','huggingface','ollama','pip',
  'library','component','framework','tailwind','shadcn','vercel','webgl','react',
  'next','typescript','javascript','css','html','python','rust','api','cli','tool',
  'editor','ui','design','figma','animation','3d','shader','svg','svelte','vue',
  'astro','vite','bundler','compiler','database','auth','saas','stripe','webgpu',
  'canvas','dom','browser','extension','plugin','font','icon','template',
  'boilerplate','starter','skeleton','toast','modal','chart','graph','map','globe',
  'haptic','whisper','model','llm','ai','agent','mcp','qwen','claude','gpt',
  'gemma','mistral','deepseek','cursor','lovable','v0','bolt','anthropic','ollama'];

function curate(posts) {
  return posts.filter(p => {
    const t = p.text.toLowerCase();
    if (t.trim().length < 30) return false;
    if (SKIP.some(s => t.includes(s))) return false;
    return DEV_KW.some(k => t.includes(k)) || p.text.length > 80;
  }).filter((p, i, arr) => {
    const first = p.text.split('\n')[0].toLowerCase().trim().slice(0, 60);
    return arr.findIndex(x => x.text.split('\n')[0].toLowerCase().trim().slice(0, 60) === first) === i;
  });
}

function extract(p) {
  const lines = p.text.split('\n');
  let title = lines[0];
  let body = lines.slice(1).join('\n').trim();

  // clean up title
  title = title.replace(/\s+/g, ' ').trim();
  // if title is just a URL, skip it
  if (/^https?:\/\//.test(title) && !body) return null;

  // find the main link (not fixupx/x.com)
  const urls = p.text.match(/https?:\/\/[^\s]+/g) || [];
  const mainUrl = urls.find(u => !u.includes('fixupx') && !u.includes('x.com/i/status')) || '';

  // npm/npx command
  const npm = p.text.match(/(npm\s+(?:i|install)\s+\S+|npx\s+\S+\s*\S*)/);

  // clean body - remove URLs that are already in the link
  if (mainUrl) {
    body = body.replace(mainUrl, '').trim();
  }

  return { title, body, mainUrl, npm, id: p.id, photos: p.photos || [], videos: p.videos || [] };
}

fetch('posts.json')
  .then(r => r.json())
  .then(allPosts => {
    const posts = curate(allPosts);
    const feed = document.getElementById('feed');
    feed.innerHTML = '';

    posts.forEach((p, idx) => {
      const e = extract(p);
      if (!e) return;

      const isFeatured = idx === 0;
      const hasMedia = e.photos.length > 0 || e.videos.length > 0;
      const cls = isFeatured ? 'post featured' : hasMedia ? 'post' : 'post text-only';

      let mediaHtml = '';
      if (e.photos.length) {
        mediaHtml = `<div class="post-media"><img src="${esc(e.photos[0])}" loading="${isFeatured ? 'eager' : 'lazy'}" decoding="async" alt=""></div>`;
      } else if (e.videos.length) {
        mediaHtml = `<div class="post-media"><video src="${esc(e.videos[0])}" controls preload="metadata" playsinline></video></div>`;
      }

      const titleHtml = e.mainUrl
        ? `<div class="post-title"><a href="${esc(e.mainUrl)}" target="_blank" rel="noopener">${esc(e.title)}</a></div>`
        : `<div class="post-title">${esc(e.title)}</div>`;

      const bodyHtml = e.body
        ? `<div class="post-body">${linkify(esc(e.body))}</div>`
        : '';

      const cmdHtml = e.npm ? `<span class="cmd">${esc(e.npm[0])}</span>` : '';
      const srcHtml = e.mainUrl ? `<a class="source" href="${esc(e.mainUrl)}" target="_blank">${esc(new URL(e.mainUrl).hostname.replace('www.',''))}</a>` : '';

      feed.innerHTML += `<div class="${cls}">
        ${mediaHtml}
        ${titleHtml}
        ${bodyHtml}
        <div class="post-meta">${cmdHtml}${srcHtml}<span class="id">#${e.id}</span></div>
      </div>`;
    });
  })
  .catch(() => {
    document.getElementById('feed').innerHTML = '<div class="loading">failed to load</div>';
  });
</script>
</body>
</html>
